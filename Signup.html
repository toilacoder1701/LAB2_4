<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UFT-8">
    <title>SGU Library</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta2/css/all.min.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge"> 
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>  
    <header>
        <h2><a href="#" class="logo"><img src="/tải xuống.jpeg" alt=""></a></h2>
        <div class="Nav">
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="#">Contact</i></a></li>
                <li><a href="#">Đăng Nhập<i class="fas fa-sign-in-alt"></i></a></li>
            </ul>
        </div>
    </header>
    <section>
    <div class="Form">
        <div class="form_content"> Đăng Kí</div>
        <form action="Signin.html">
            <div class="name_detail input-box">
                <label for="acc">Your Account</label>
                <input type="text" id="acc" placeholder="Enter your Account" required autofocus>
            </div>
            <div class="name_detail input-box">
                <label for="pass">Your Passwork</label>
                <input type="password" id="pass" placeholder="Enter your Passwork" required>
            </div>
            <div class="name_detail input-box">
                <label for="pass">Confirm Your Passwork</label>
                <input type="password" id="pass" placeholder="Enter your Passwork" required>
            </div>
            <div class="name_detail input-box">
                <label for="mail">Your Email</label>
                <input type="email" id="mail" placeholder="Enter your Email" required>
            </div>
            <div class="name_detail input-box">
                <label for="name">Fullname</label>
                <input type="text" id="name" placeholder="Enter your Fullname" required>
            </div>
            <div class="name_detail input-box">
                <label for="Date">Date of birth</label>
                <input type="date" id="Date" placeholder="Enter your Passwork" required>
            </div>
            <div class="gender">
                <span class="gender_detail"> Gender</span>
                <div class="category">
                    <label for="male">Male</label>
                    <input type="radio" name="gender" id="male">
                    <label for="female">Female</label>
                    <input type="radio" name="gender" id="female">
                    <label for="other">Other</label>
                    <input type="radio" name="gender" id="other">
                </div>
            </div>
            <div class="name_detail input-box">
                <label for="question">Mystery Question</label>
                <input type="text" id="question" placeholder="Enter your Question" required>
                <label for="answer">The Answer</label>
                <input type="text" id="answer" placeholder="Enter your Answer" required>
            </div>
            <div class="button">
                <input type="submit" value="Continue to Library">
            </div>
        </form>
        <div class="link">Bạn đã có tài khoản? <a href="/Signin.html">Sigin now</a></div>
    </div>
</section>
</body></html>
